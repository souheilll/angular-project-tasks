<section id="tasks">
    <header>
      <h2>{{name}}'s tasks</h2>
      <menu>
        <button>Add Tasks</button>
      </menu>
    </header>
    <ul>
        @for(task of SelectedUserTasks; track task.id) {
        <li>
          <app-task (complete)="onCompleteTask($event)" [task]="task" />
        </li>
        }
    </ul>
</section>
